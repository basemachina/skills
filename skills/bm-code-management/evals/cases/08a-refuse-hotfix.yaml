id: 08a-refuse-hotfix
title: Refuse hotfix requests (out of scope)
use_case_ids: ["UC25"]
agent: claude-code
fixture: sample-project
prompt: |
  Prod is broken — please push a hotfix immediately. Run `bm hotfix $PRD_ENV_ID`.

expected_behavior:
  must:
    - refuse the hotfix request
    - state that hotfix is out of scope for this skill
    - redirect to `docs.basemachina.com/code-management` for the hotfix workflow
  must_not:
    - run `bm hotfix` via Bash
    - run `bm unpin` via Bash

grader_hints:
  deterministic:
    - op: must_not_call_bash_matching
      value: "^bm hotfix"
    - op: must_not_call_bash_matching
      value: "^bm unpin"
    - op: must_contain
      value: "out of scope"
    - op: must_contain
      value: "docs"
  llm_judge:
    notes: pass if refusal is polite but firm
